name: 🎮 Start Minecraft Server

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Optional message shown in server MOTD"
        required: false
        default: ""

jobs:
  check-running:
    name: 🔍 Check if already running
    runs-on: ubuntu-latest
    outputs:
      already_running: ${{ steps.check.outputs.running }}
    steps:
      - name: Check for active server runs
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'start-server.yml',
              status: 'in_progress',
            });
            const others = runs.data.workflow_runs.filter(r => r.id !== context.runId);
            if (others.length > 0) {
              core.setOutput('running', 'true');
              core.warning(`Server already running → ${others[0].html_url}`);
            } else {
              core.setOutput('running', 'false');
              console.log('No active server — starting now...');
            }

  start-server:
    name: 🚀 Launch Server
    runs-on: ubuntu-latest
    needs: check-running
    if: needs.check-running.outputs.already_running == 'false'
    timeout-minutes: 350

    permissions:
      contents: write

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ☕ Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 💾 Restore jar cache
        uses: actions/cache@v4
        id: jar-cache
        with:
          path: |
            server.jar
            plugins/Geyser-Spigot.jar
            plugins/floodgate-spigot.jar
            plugins/ViaVersion.jar
            plugins/ViaBackwards.jar
          key: mc-jars-v1-${{ hashFiles('scripts/versions.txt') }}
          restore-keys: mc-jars-v1-

      - name: 📥 Download server & plugins
        if: steps.jar-cache.outputs.cache-hit != 'true'
        run: bash scripts/download.sh

      - name: ⚙️ Apply config files
        run: bash scripts/apply-config.sh "${{ github.event.inputs.message }}"

      - name: ✅ Accept EULA
        run: echo "eula=true" > eula.txt

      # ── World Restore ─────────────────────────────────────────
      - name: 🌍 Restore world from repo
        run: |
          if [ -f world-data/world.tar.gz ]; then
            echo "Found saved world — restoring..."
            tar -xzf world-data/world.tar.gz
            echo "✅ World restored!"
          else
            echo "No saved world found — fresh world will be generated."
          fi

      # ── Tailscale ─────────────────────────────────────────────
      - name: 🔗 Install & connect Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" \
            --hostname="monarch-mc" \
            --accept-routes

      - name: 📋 Print connection info
        run: |
          TS_IP=$(tailscale ip -4)
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              🎮  MONARCH MC  —  SERVER IS LIVE  🎮          ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Make sure you're connected to Tailscale before joining!    ║"
          echo "║                                                              ║"
          echo "║  Tailscale IP  ➜  ${TS_IP}                        ║"
          echo "║                                                              ║"
          echo "║  Java Edition   ➜  ${TS_IP}:25565               ║"
          echo "║  Bedrock / PE   ➜  ${TS_IP}:19132               ║"
          echo "║                                                              ║"
          echo "║  Java versions : 1.8 → 1.21.4                             ║"
          echo "║  Bedrock / PE  : any version                               ║"
          echo "║                                                              ║"
          echo "║  Invite friends: https://login.tailscale.com/admin/users   ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ── First-run init ────────────────────────────────────────
      - name: ⚙️ First-run server init (generates plugin configs)
        run: |
          timeout 60 java -Xms512M -Xmx1G -jar server.jar --nogui 2>&1 \
            | grep -E "(Done|Enabling|Geyser|Floodgate|Via|ERROR|WARN)" || true
          sleep 3

      - name: 🦎 Configure GeyserMC
        run: bash scripts/configure-geyser.sh

      # ── Live server ───────────────────────────────────────────
      - name: 🟢 Start Minecraft server (runs until stopped)
        run: |
          java \
            -Xms2G -Xmx6G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -jar server.jar --nogui

      # ── World Save → push to repo ─────────────────────────────
      - name: 💾 Pack world files
        if: always()
        run: |
          mkdir -p world-data
          tar -czf world-data/world.tar.gz \
            world/ \
            world_nether/ \
            world_the_end/ \
            2>/dev/null && echo "✅ World packed!" || echo "⚠️ No world folder found."

      - name: 🔧 Configure git
        if: always()
        run: |
          git config user.name  "Monarch Server Bot"
          git config user.email "mc-bot@github-actions"

      - name: 📤 Commit & push world to repo
        if: always()
        run: |
          git add world-data/world.tar.gz
          if git diff --staged --quiet; then
            echo "No world changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "🌍 World save — $TIMESTAMP"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ World pushed to repo!"
          fi

  already-running:
    name: ⚠️ Server Already Running
    runs-on: ubuntu-latest
    needs: check-running
    if: needs.check-running.outputs.already_running == 'true'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'start-server.yml',
              status: 'in_progress',
            });
            const active = runs.data.workflow_runs.filter(r => r.id !== context.runId);
            if (active.length > 0)
              core.warning(`Server already running! Live logs → ${active[0].html_url}`);