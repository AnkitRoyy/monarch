name: server/start

on:
  workflow_dispatch:
    inputs:
      message:
        description: "MOTD suffix (optional)"
        required: false
        default: ""

jobs:
  guard:
    name: check
    runs-on: ubuntu-latest
    outputs:
      running: ${{ steps.check.outputs.running }}
    steps:
      - name: already running?
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'start-server.yml',
              status: 'in_progress',
            });
            const others = runs.data.workflow_runs.filter(r => r.id !== context.runId);
            if (others.length > 0) {
              core.setOutput('running', 'true');
              core.warning(`already running -> ${others[0].html_url}`);
            } else {
              core.setOutput('running', 'false');
            }

  start:
    name: launch
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.running == 'false'
    timeout-minutes: 350

    permissions:
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: restore jar cache
        uses: actions/cache@v4
        id: jar-cache
        with:
          path: |
            server.jar
            plugins/Geyser-Spigot.jar
            plugins/floodgate-spigot.jar
            plugins/ViaVersion.jar
            plugins/ViaBackwards.jar
          key: mc-jars-v1-${{ hashFiles('scripts/versions.txt') }}
          restore-keys: mc-jars-v1-

      - name: download server & plugins
        if: steps.jar-cache.outputs.cache-hit != 'true'
        run: bash scripts/download.sh

      - name: apply config
        run: bash scripts/apply-config.sh "${{ github.event.inputs.message }}"

      - name: accept eula
        run: echo "eula=true" > eula.txt

      - name: restore world
        run: |
          if [ -f world-data/world.tar.gz ]; then
            echo "restoring saved world..."
            tar -xzf world-data/world.tar.gz
          else
            echo "no saved world found — fresh generation."
          fi

      - name: connect tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" \
            --hostname="monarch-mc" \
            --accept-routes

      - name: connection info
        run: |
          TS_IP=$(tailscale ip -4)
          echo ""
          echo "  ┌─────────────────────────────────────────┐"
          echo "  │           monarch mc  —  live            │"
          echo "  ├─────────────────────────────────────────┤"
          echo "  │                                         │"
          echo "  │  connect via tailscale before joining   │"
          echo "  │                                         │"
          echo "  │  ip      ->  ${TS_IP}              │"
          echo "  │  java    ->  ${TS_IP}:25565        │"
          echo "  │  bedrock ->  ${TS_IP}:19132        │"
          echo "  │                                         │"
          echo "  │  java    1.8 -> 1.21.4                 │"
          echo "  │  bedrock any version                    │"
          echo "  │                                         │"
          echo "  └─────────────────────────────────────────┘"

      - name: first-run init
        run: |
          timeout 60 java -Xms512M -Xmx1G -jar server.jar --nogui 2>&1 \
            | grep -E "(Done|Enabling|Geyser|Floodgate|Via|ERROR|WARN)" || true
          sleep 3

      - name: configure geyser
        run: bash scripts/configure-geyser.sh

      - name: start server
        run: |
          sudo apt-get install -y screen -q
          screen -dmS mc bash -c "java \
            -Xms2G -Xmx6G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -jar server.jar --nogui 2>&1 | tee /tmp/mc.log"
          trap "screen -S mc -p 0 -X stuff 'save-all\n'; while ! grep -q 'Saved the game' /tmp/mc.log; do sleep 1; done; screen -S mc -p 0 -X stuff 'stop\n'; while screen -list | grep -q mc; do sleep 2; done" SIGTERM SIGINT
          tail -f /tmp/mc.log &
          while screen -list | grep -q mc; do sleep 5; done

      - name: pack world
        if: always()
        run: |
          mkdir -p world-data
          tar -czf world-data/world.tar.gz \
            world/ world_nether/ world_the_end/ \
            2>/dev/null && echo "world packed." || echo "no world folder found."

      - name: configure git
        if: always()
        run: |
          git config user.name  "AnkitRoyy"
          git config user.email "ankitkumarroy2007@gmail.com"

      - name: push world to repo
        if: always()
        run: |
          git add world-data/world.tar.gz
          if git diff --staged --quiet; then
            echo "no world changes."
          else
            TIMESTAMP=$(TZ='Asia/Kolkata' date '+%H:%M')
            git commit -m "world saved at $TIMESTAMP"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
            echo "world pushed."
          fi

      - name: disconnect tailscale
        if: always()
        run: sudo tailscale logout


  blocked:
    name: blocked
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.running == 'true'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'start-server.yml',
              status: 'in_progress',
            });
            const active = runs.data.workflow_runs.filter(r => r.id !== context.runId);
            if (active.length > 0)
              core.warning(`server already running -> ${active[0].html_url}`);