name: server/stop

on:
  workflow_dispatch:

jobs:
  stop:
    name: cancel
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: find and cancel active run
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'start-server.yml',
              status: 'in_progress',
            });

            const active = runs.data.workflow_runs.filter(r => r.id !== context.runId);

            if (active.length === 0) {
              console.log('no active server found.');
              return;
            }

            for (const run of active) {
              console.log(`stopping run #${run.id}...`);
              await github.rest.actions.cancelWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              console.log(`run #${run.id} cancelled — world is saving.`);
            }